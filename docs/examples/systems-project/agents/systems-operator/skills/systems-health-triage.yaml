kind: skill
id: systems-health-triage
name: Systems Health Triage
version: 1.0.0
description: Reusable process for reviewing target health and recommending operational next steps

tools:
  - id: target-monitor
  - id: provisioning-orchestrator

instructions: |
  1. Gather target health, incident, and provisioning state.
  2. Compare current signals against monitoring policies and runbooks.
  3. Identify risks, blockers, and required approvals.
  4. Produce a grounded health summary and recommended next actions.

metadata:
  tags: [systems, triage, runbooks]
